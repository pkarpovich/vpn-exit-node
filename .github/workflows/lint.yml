name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck scripts
        run: shellcheck scripts/*.sh

  compose-config:
    name: compose config
    runs-on: ubuntu-latest
    # Required vars use the ${VAR:?} form, so config validation needs them set.
    # Placeholders only - nothing is deployed here, just parsed.
    env:
      TS_AUTHKEY: tskey-auth-placeholder
      VPN_SERVICE_PROVIDER: custom
    steps:
      - uses: actions/checkout@v4
      - name: base
        run: docker compose -f compose.yml config -q
      - name: socks profile
        run: docker compose -f compose.yml --profile socks config -q
      - name: vpn override
        run: docker compose -f compose.yml -f compose.vpn.yml config -q
