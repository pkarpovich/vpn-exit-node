# Keep the CI workflow's GitHub Actions up to date. The repo no longer ships an
# npm package, so the previous "npm" ecosystem entry was removed.
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
